<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERO OMS | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo.png" alt="Logo" class="nav-logo">
                <h3>EduFlow</h3>
            </div>

            <ul class="list-unstyled components">
                <li><a href="#" class="nav-link" data-module="dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#" class="nav-link" data-module="students"><i class="fas fa-user-graduate"></i> Students</a></li>
                <li><a href="#" class="nav-link" data-module="events"><i class="fas fa-calendar-star"></i> Events</a></li>
                <li><a href="#" class="nav-link" data-module="finance"><i class="fas fa-wallet"></i> Finance</a></li>
                <li><a href="#" class="nav-link" data-module="attendance"><i class="fas fa-clipboard-check"></i> Attendance</a></li>
                <li class="admin-only"><a href="#" class="nav-link" data-module="settings"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>

            <button id="logout-btn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </nav>

        <div id="content">
            <header class="top-nav">
                <div id="bible-verse" class="verse-text">Loading daily inspiration...</div>
                <div class="header-right">
                    <span id="clock">00:00:00</span>
                    <span id="user-display" class="badge">Staff</span>
                </div>
            </header>

            <div id="module-container" class="container-fluid">
                <div id="dashboard-view">
                    <h2>Welcome back!</h2>
                    <div class="stats-row">
                        <div class="stat-card"><h3>Daily Total</h3><p id="dash-collection">₱0.00</p></div>
                        <div class="stat-card"><h3>Active Events</h3><p id="dash-events">0</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { checkAuth, logout } from './js/auth.js';
    import { initStudents } from './js/students.js';
    import { initEvents } from './js/events.js';
    import { initFinance } from './js/finance.js';
    import { initAttendance } from './js/attendance.js';

    // 1. Secure the page & Set User Profile
    checkAuth();
    const userRole = localStorage.getItem('userRole') || 'Staff';
    document.getElementById('user-display').innerText = userRole;

    // 2. Logout functionality
    document.getElementById('logout-btn').addEventListener('click', logout);

    // 3. Central Module Switcher (The Controller)
    const switchModule = (moduleName) => {
        // Clear active states on sidebar
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        
        // Add active state to clicked link
        const activeLink = document.querySelector(`[data-module="${moduleName}"]`);
        if (activeLink) activeLink.classList.add('active');

        // Initialize the specific module
        switch (moduleName) {
            case 'dashboard':
                location.reload(); // Simplest way to return to the default dashboard view
                break;
            case 'students':
                initStudents();
                break;
            case 'events':
                initEvents();
                break;
            case 'finance':
                initFinance();
                break;
            case 'attendance':
                initAttendance();
                break;
            case 'settings':
                // initSettings(); // For future build
                alert("Settings module coming soon!");
                break;
            default:
                console.warn("Module not found");
        }
    };

    // Attach click events to all sidebar links
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const module = e.currentTarget.dataset.module;
            switchModule(module);
        });
    });

    // 4. Bible Verse API Integration
    async function fetchVerse() {
        try {
            const res = await fetch('https://labs.bible.org/api/?passage=votd&type=json');
            const data = await res.json();
            document.getElementById('bible-verse').innerText = `"${data[0].text}" - ${data[0].bookname} ${data[0].chapter}:${data[0].verse}`;
        } catch (e) { 
            document.getElementById('bible-verse').innerText = "Walk by faith, not by sight.";
        }
    }

    // 5. Real-time Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Initial load
    fetchVerse();
</script>

</body>
</html>
